<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(content=~{::div})}">
<head>
    <title>Schedule Bulk Mail</title>
</head>
<body>
    <div class="container">
        <h2 class="mb-4">Schedule New Bulk Email</h2>
        
        <div class="card p-4">
            <form th:action="@{/schedule}" method="post">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="subject" class="form-label">Subject</label>
                        <input type="text" class="form-control" id="subject" name="subject" required placeholder="Email Subject">
                    </div>
                    <div class="col-md-3">
                        <label for="dailyLimit" class="form-label">Daily Limit</label>
                        <input type="number" class="form-control" id="dailyLimit" name="dailyLimit" required value="100">
                    </div>
                    <div class="col-md-3">
                        <label for="startTime" class="form-label">Start Time</label>
                        <input type="time" class="form-control" id="startTime" name="startTime" required value="09:00">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="body" class="form-label">Email Body (HTML supported)</label>
                    <textarea class="form-control" id="body" name="body" rows="6" required placeholder="Write your email content here..."></textarea>
                </div>

                <div class="row mb-3">
                    <div class="col-md-8">
                        <label for="recipientList" class="form-label">Recipients (one email per line)</label>
                        <textarea class="form-control" id="recipientList" name="recipientList" rows="8" required placeholder="user1@example.com&#10;user2@example.com"></textarea>
                    </div>
                    <div class="col-md-4">
                        <div class="border rounded p-3 bg-light">
                            <h6>Import from Google Sheets</h6>
                            <div class="mb-2">
                                <label class="form-label small">Sheet URL</label>
                                <input type="text" id="sheetUrl" class="form-control form-control-sm" placeholder="https://docs.google.com/...">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Sheet Number (1 for first sheet)</label>
                                <input type="number" id="sheetIndex" class="form-control form-control-sm" value="1" min="1">
                            </div>
                            <button type="button" class="btn btn-sm btn-primary w-100" onclick="fetchFromSheet()">Fetch Emails</button>
                            <div id="fetchStatus" class="small mt-1 text-muted"></div>
                        </div>
                        
                        <div class="mt-4">
                            <label for="delaySeconds" class="form-label">Delay Between Mails (seconds)</label>
                            <input type="number" class="form-control" id="delaySeconds" name="delaySeconds" required value="5">
                            <div class="form-text mt-3">
                                Throttling helps avoid spam filters.
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a th:href="@{/batches}" class="btn btn-outline-secondary me-md-2">Cancel</a>
                    <button type="submit" class="btn btn-primary px-5">Schedule Campaign</button>
                </div>
            </form>
        </div>

        <script>
            async function fetchFromSheet() {
                const url = document.getElementById('sheetUrl').value;
                const sheetIndex = document.getElementById('sheetIndex').value;
                const statusDiv = document.getElementById('fetchStatus');
                const recipientArea = document.getElementById('recipientList');

                if (!url) {
                    alert('Please enter a Google Sheet URL');
                    return;
                }

                statusDiv.textContent = 'Connecting to Google Sheets...';
                statusDiv.className = 'small mt-1 text-primary fw-bold';

                try {
                    const response = await fetch('/api/bulk-mail/fetch-sheets', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url, sheetIndex: parseInt(sheetIndex) })
                    });

                    if (!response.ok) {
                        const error = await response.text();
                        throw new Error(error);
                    }

                    const emails = await response.json();
                    if (emails.length === 0) {
                        statusDiv.textContent = 'No emails found in this sheet.';
                        statusDiv.className = 'small mt-1 text-warning';
                    } else {
                        recipientArea.value = emails.join('\n');
                        statusDiv.textContent = `Successfully filled ${emails.length} emails from sheet #${sheetIndex}.`;
                        statusDiv.className = 'small mt-1 text-success fw-bold';
                    }
                } catch (err) {
                    console.error(err);
                    statusDiv.textContent = 'Error: ' + err.message;
                    statusDiv.className = 'small mt-1 text-danger';
                }
            }
        </script>
    </div>
</body>
</html>
