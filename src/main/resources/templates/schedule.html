<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(content=~{::div})}">
<head>
    <title>Schedule Bulk Mail</title>
</head>
<body>
    <div class="container">
        <h2 class="mb-4">Schedule New Bulk Email</h2>
        
        <div class="card p-4">
            <form th:action="@{/schedule}" method="post" id="scheduleForm">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="subject" class="form-label">Subject</label>
                        <input type="text" class="form-control" id="subject" name="subject" required placeholder="Email Subject (supports [[NAME]])">
                    </div>
                    <div class="col-md-3">
                        <label for="dailyLimit" class="form-label">Daily Limit</label>
                        <input type="number" class="form-control" id="dailyLimit" name="dailyLimit" required value="100">
                    </div>
                    <div class="col-md-3">
                        <label for="startTime" class="form-label">Start Time</label>
                        <input type="time" class="form-control" id="startTime" name="startTime" required value="09:00">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="body" class="form-label">Email Body (HTML and [[NAME]] supported)</label>
                    <textarea class="form-control" id="body" name="body" rows="6" required placeholder="Hi[[NAME]],&#10;Write your email content here..."></textarea>
                    <div class="form-text">Use <code>[[NAME]]</code> for personalization. It adds a space before the name if available.</div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-8">
                        <label for="recipientList" class="form-label">Recipients (one per line, format: <code>email,name</code> or just <code>email</code>)</label>
                        <textarea class="form-control" id="recipientList" name="recipientList" rows="8" required placeholder="user1@example.com,John Doe&#10;user2@example.com"></textarea>
                    </div>
                    <div class="col-md-4">
                        <div class="border rounded p-3 bg-light mb-3">
                            <h6>Import from Google Sheets</h6>
                            <div class="mb-2">
                                <label class="form-label small">Sheet URL</label>
                                <input type="text" id="sheetUrl" class="form-control form-control-sm" placeholder="https://docs.google.com/...">
                            </div>
                            <div class="mb-2">
                                <label class="form-label small">Sheet Number (1 for first sheet)</label>
                                <input type="number" id="sheetIndex" class="form-control form-control-sm" value="1" min="1">
                            </div>
                            <button type="button" class="btn btn-sm btn-primary w-100" onclick="fetchFromSheet()">Fetch Emails & Names</button>
                            <div id="fetchStatus" class="small mt-1 text-muted"></div>
                        </div>
                        
                        <div class="mt-3">
                            <label for="delaySeconds" class="form-label">Delay Between Mails (seconds)</label>
                            <input type="number" class="form-control" id="delaySeconds" name="delaySeconds" required value="5">
                        </div>
                    </div>
                </div>

                <div class="border-top pt-3 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <input type="email" id="testEmail" class="form-control form-control-sm me-2" style="width: 250px;" placeholder="Enter test email address">
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="sendTestEmail()">Send Test Mail</button>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a th:href="@{/batches}" class="btn btn-outline-secondary me-md-2">Cancel</a>
                        <button type="submit" class="btn btn-primary px-5">Schedule Campaign</button>
                    </div>
                </div>
                <div id="testStatus" class="text-end small mt-1"></div>
            </form>
        </div>

        <script>
            async function fetchFromSheet() {
                const url = document.getElementById('sheetUrl').value;
                const sheetIndex = document.getElementById('sheetIndex').value;
                const statusDiv = document.getElementById('fetchStatus');
                const recipientArea = document.getElementById('recipientList');

                if (!url) {
                    alert('Please enter a Google Sheet URL');
                    return;
                }

                statusDiv.textContent = 'Connecting to Google Sheets...';
                statusDiv.className = 'small mt-1 text-primary fw-bold';

                try {
                    const response = await fetch('/api/bulk-mail/fetch-sheets', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url, sheetIndex: parseInt(sheetIndex) })
                    });

                    if (!response.ok) {
                        const error = await response.text();
                        throw new Error(error);
                    }

                    const recipients = await response.json();
                    if (recipients.length === 0) {
                        statusDiv.textContent = 'No recipients found in this sheet.';
                        statusDiv.className = 'small mt-1 text-warning';
                    } else {
                        const formatted = recipients.map(r => r.name ? `${r.email},${r.name}` : r.email).join('\n');
                        recipientArea.value = formatted;
                        statusDiv.textContent = `Successfully filled ${recipients.length} recipients.`;
                        statusDiv.className = 'small mt-1 text-success fw-bold';
                    }
                } catch (err) {
                    console.error(err);
                    statusDiv.textContent = 'Error: ' + err.message;
                    statusDiv.className = 'small mt-1 text-danger';
                }
            }

            async function sendTestEmail() {
                const to = document.getElementById('testEmail').value;
                const subject = document.getElementById('subject').value;
                const body = document.getElementById('body').value;
                const statusDiv = document.getElementById('testStatus');

                if (!to || !subject || !body) {
                    alert('Please enter a test email, subject, and body.');
                    return;
                }

                statusDiv.textContent = 'Sending test...';
                statusDiv.className = 'text-end small mt-1 text-primary';

                try {
                    const response = await fetch('/api/bulk-mail/test-send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ to, subject, body })
                    });

                    const result = await response.text();
                    if (response.ok) {
                        statusDiv.textContent = '✅ ' + result;
                        statusDiv.className = 'text-end small mt-1 text-success fw-bold';
                    } else {
                        throw new Error(result);
                    }
                } catch (err) {
                    statusDiv.textContent = '❌ ' + err.message;
                    statusDiv.className = 'text-end small mt-1 text-danger fw-bold';
                }
            }
        </script>
    </div>
</body>
</html>
